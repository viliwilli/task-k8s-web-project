---
- name: Prepare all VMs for Kubernetes
  hosts: k3s_cluster
  become: true
  gather_facts: true

  tasks:
    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Install required packages
      ansible.builtin.apt:
        name:
          - curl
          - ca-certificates
          - iptables
          - iproute2
          - net-tools
        state: present

    - name: Disable swap immediately
      ansible.builtin.command: swapoff -a
      when: ansible_swaptotal_mb | int > 0
      changed_when: false

    - name: Disable swap permanently in fstab
      ansible.builtin.replace:
        path: /etc/fstab
        regexp: '^([^#].*\sswap\s.*)$'
        replace: '# \1'

    - name: Load required kernel modules on boot
      ansible.builtin.copy:
        dest: /etc/modules-load.d/k8s.conf
        owner: root
        group: root
        mode: '0644'
        content: |
          overlay
          br_netfilter

    - name: Load overlay module now
      ansible.builtin.command: modprobe overlay
      changed_when: false

    - name: Load br_netfilter module now
      ansible.builtin.command: modprobe br_netfilter
      changed_when: false

    - name: Configure Kubernetes networking sysctl values
      ansible.builtin.copy:
        dest: /etc/sysctl.d/99-kubernetes.conf
        owner: root
        group: root
        mode: '0644'
        content: |
          net.bridge.bridge-nf-call-iptables = 1
          net.bridge.bridge-nf-call-ip6tables = 1
          net.ipv4.ip_forward = 1

    - name: Apply sysctl values
      ansible.builtin.command: sysctl --system
      changed_when: false
---
# pr-validate.yml — Pull Request validation ("terraform plan")
#
# Runs on every PR to main. Validates that all changes are correct BEFORE merge.
# If any check fails, the PR should not be merged.
#
# Jobs:
#   validate  — calls the reusable validate.yml (YAML, Ansible, Kubernetes)
#   commits   — checks commit messages follow Conventional Commits (repo-config.json)
#   comment   — posts a pass/fail summary as a PR comment

name: PR Validation

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:

  # Run all file-level validations via the reusable workflow
  validate:
    name: Validate
    uses: ./.github/workflows/validate.yml

  # Check every commit message in the PR against repo-config.json
  commits:
    name: Conventional Commits
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check commit messages
        run: |
          sudo apt-get install -y -q jq
          chmod +x scripts/check-commits.sh
          git log origin/main..HEAD --format="%s" | ./scripts/check-commits.sh

  # Post a consolidated result comment on the PR
  comment:
    name: Post PR Comment
    runs-on: ubuntu-latest
    needs: [validate, commits]
    if: always()
    steps:
      - name: Post or update summary comment
        uses: actions/github-script@v7
        with:
          script: |
            const ok = r => r === 'success' ? '✅' : '❌';
            const val     = '${{ needs.validate.result }}';
            const commits = '${{ needs.commits.result }}';
            const allOk   = val === 'success' && commits === 'success';

            const body = [
              '## PR Validation Summary',
              '',
              `| Check | Result |`,
              `|-------|--------|`,
              `| YAML · Ansible · Kubernetes | ${ok(val)} ${val} |`,
              `| Conventional Commits | ${ok(commits)} ${commits} |`,
              '',
              allOk
                ? '✅ All checks passed. Ready to merge.'
                : '❌ Fix the failing checks, then push again.',
            ].join('\n');

            const {data: comments} = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body.includes('## PR Validation Summary'));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

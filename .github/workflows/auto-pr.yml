# auto-pr.yml
#
# PURPOSE
# -------
# When you push a new branch to GitHub, this workflow automatically opens a
# Draft Pull Request targeting main. You no longer need to go to GitHub and
# click "Compare & pull request" manually.
#
# A DRAFT PR means:
#   - It shows up in the PR list so reviewers can see work in progress
#   - CI checks (pr-validate.yml) run immediately
#   - It cannot be accidentally merged while still in draft
#   - You click "Ready for review" when the work is done
#
# HOW IT WORKS
# ------------
# 1. You create a branch and push it:
#      git checkout -b Jira-ticket-010
#      git push -u origin Jira-ticket-010
# 2. This workflow triggers automatically
# 3. It checks whether a PR for this branch already exists
# 4. If not, it creates a Draft PR with the PR template pre-filled
# 5. The pr-validate.yml workflow then triggers on the new PR
#
# PERMISSIONS
# -----------
# The workflow uses the built-in GITHUB_TOKEN which has read/write access
# to pull-requests on your own repository. No secrets need to be configured.

name: Auto Create PR

on:
  push:
    branches:
      # Match any branch except main
      - '**'
      - '!main'

permissions:
  # Required to create pull requests
  pull-requests: write
  # Required to read repository contents
  contents: read

jobs:
  create-pr:
    name: Create Draft PR
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create Draft PR if one does not exist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="${{ github.ref_name }}"
          echo "Branch: ${BRANCH}"

          # Check if a PR already exists for this branch.
          # 'gh pr list' returns an empty string if no PR exists.
          EXISTING_PR=$(gh pr list \
            --head "${BRANCH}" \
            --base main \
            --json number \
            --jq '.[0].number // ""')

          if [ -n "${EXISTING_PR}" ]; then
            echo "Pull request #${EXISTING_PR} already exists for branch '${BRANCH}'. Skipping."
            exit 0
          fi

          # Convert branch name to a readable PR title.
          # Example: "Jira-ticket-010" → "Jira Ticket 010"
          PR_TITLE=$(echo "${BRANCH}" | tr '-' ' ' | sed 's/\b./\u&/g')

          echo "Creating Draft PR: ${PR_TITLE}"

          gh pr create \
            --draft \
            --base main \
            --head "${BRANCH}" \
            --title "${PR_TITLE}" \
            --body "$(cat .github/pull_request_template.md)"

          echo "Draft PR created. The pr-validate workflow will now run automatically."

---
# post-merge.yml — Post-merge validation and summary ("terraform apply")
#
# Runs after every merge to main.
# Validates the merged state and writes a deployment summary to the
# Actions UI (Actions tab → this run → Summary).
#
# Argo CD picks up the change automatically within ~3 minutes.

name: Post-Merge

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:

  # Run all file-level validations via the reusable workflow
  validate:
    name: Validate
    uses: ./.github/workflows/validate.yml

  # Write a deployment summary to the Actions UI
  summary:
    name: Deployment Summary
    runs-on: ubuntu-latest
    needs: validate
    if: always()
    steps:
      - uses: actions/checkout@v4

      - name: Write step summary
        run: |
          {
            echo "## Deployment Summary"
            echo ""
            echo "Merged by **${{ github.actor }}** · \`${GITHUB_SHA:0:7}\`"
            echo ""
            if [ "${{ needs.validate.result }}" = "success" ]; then
              echo "✅ All validations passed. Argo CD will sync the cluster within ~3 minutes."
            else
              echo "❌ Validation failed. Check the validate job above."
            fi
            echo ""
            echo "### Kubernetes resources on \`main\`"
            echo ""
            echo "| File | Kind | Name |"
            echo "|------|------|------|"
            find kubernetes/ -name "*.yaml" | sort | while read -r f; do
              kind=$(grep "^kind:" "$f" | head -1 | awk '{print $2}')
              name=$(grep "^  name:" "$f" | head -1 | awk '{print $2}')
              echo "| \`$f\` | $kind | $name |"
            done
            echo ""
            echo "### Apply locally"
            echo "| Step | Command |"
            echo "|------|---------|"
            echo "| Start VMs | \`make up\` |"
            echo "| Force sync | \`make bootstrap\` |"
            echo "| Verify | \`make status\` |"
          } >> "$GITHUB_STEP_SUMMARY"
